name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same workflow on the same ref
# (e.g. force-push to a PR branch supersedes the prior run).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Detect path changes — drives conditional jobs ────────────────────────
  changes:
    name: Detect path changes
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            desktop:
              - 'packages/desktop/**'
            web:
              - 'packages/web/**'

  # ─── Parallel quality jobs (each fast, focused, independent) ──────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter @openconcho/web test:coverage
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: packages/web/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter @openconcho/web build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # High and critical block; moderate/low are surfaced as warnings.
      - run: pnpm audit --audit-level=high --prod

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Conditional: Rust cargo-check on desktop changes only ────────────────
  cargo-check:
    name: Rust cargo-check (desktop)
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri
      - name: Install Linux Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev
      - uses: ./.github/actions/setup
      - run: pnpm --filter @openconcho/desktop cargo-check

  # ─── Meta job — single required status check ─────────────────────────────
  # Keeps branch-protection config simple: only `check` is required.
  # `check` succeeds iff every required parallel job succeeded (or was
  # legitimately skipped via path filter).
  check:
    name: All checks
    needs: [lint, typecheck, test, build, audit, secrets, cargo-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate results
        run: |
          set -e
          declare -A results=(
            [lint]="${{ needs.lint.result }}"
            [typecheck]="${{ needs.typecheck.result }}"
            [test]="${{ needs.test.result }}"
            [build]="${{ needs.build.result }}"
            [audit]="${{ needs.audit.result }}"
            [secrets]="${{ needs.secrets.result }}"
            [cargo-check]="${{ needs.cargo-check.result }}"
          )
          failed=0
          for job in "${!results[@]}"; do
            r="${results[$job]}"
            # success → OK. skipped → OK (path-filtered out). anything else → fail.
            case "$r" in
              success|skipped) echo "✓ $job: $r" ;;
              *) echo "✗ $job: $r"; failed=1 ;;
            esac
          done
          [ $failed -eq 0 ] || exit 1

  # ─── Release on push to main ──────────────────────────────────────────────
  release:
    name: Release
    needs: [check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: ./.github/actions/setup

      - run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
